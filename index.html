<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilson Trailer Sales & Service</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}
header{background:#111;padding:15px 20px;display:flex;align-items:center;gap:15px}
.logo{height:60px}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:#1a1a1a;padding:15px;border-radius:8px}
a{color:#fff;text-decoration:none}
</style>
</head>

<body>

<header>
<img src="/wilson_logo_v1.png" class="logo">
<div>
<h2>Wilson Trailer Sales & Service</h2>
<p>Wilson, NC</p>
</div>
</header>

<div class="container">
<h1>Inventory</h1>
<div id="inventory" class="grid"></div>
</div>

<script>
fetch('/.netlify/functions/inventory')
.then(res=>res.json())
.then(data=>{
const container=document.getElementById('inventory')
data.forEach(item=>{
container.innerHTML+=`
<a href="/vehicle.html?id=${item.id}">
<div class="card">
<h3>${item.title}</h3>
<p>$${item.price}</p>
</div>
</a>`
})
})
</script>

</body>
</html>
