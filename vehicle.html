<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle</title>
<style>
body{background:#0d0d0d;color:#fff;font-family:Arial}
.container{padding:20px}
</style>
</head>

<body>

<div class="container" id="vehicle"></div>

<script>
const id=new URLSearchParams(window.location.search).get('id')

fetch('/.netlify/functions/inventory')
.then(res=>res.json())
.then(data=>{
const item=data.find(x=>x.id==id)
document.getElementById('vehicle').innerHTML=`
<h1>${item.title}</h1>
<p>$${item.price}</p>
<p>${item.description || ''}</p>
`
})
</script>

</body>
</html>
